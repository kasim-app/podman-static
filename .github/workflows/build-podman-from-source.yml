name: build-podman-from-source

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Podman git ref to build and release (tag/branch/sha)"
        required: true
        default: "v5.8.0"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout podman
        uses: actions/checkout@v6
        with:
          repository: containers/podman
          ref: ${{ github.event.inputs.ref }}

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git make gcc pkg-config \
            btrfs-progs libbtrfs-dev \
            libdevmapper-dev \
            libgpgme-dev \
            libassuan-dev \
            libglib2.0-dev \
            libseccomp-dev \
            libselinux1-dev \
            go-md2man \
            iptables \
            uidmap \
            slirp4netns \
            fuse-overlayfs

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          # Podman versions may require a specific Go version; adjust as needed
          go-version: stable

      - name: Build podman
        run: |
          make BUILDTAGS="seccomp selinux"
          ./bin/podman --version

      - name: Prepare release file
        run: cp bin/podman podman-${{ github.event.inputs.ref }}-linux-amd64

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.ref }}
          name: ${{ github.event.inputs.ref }}
          files: podman-${{ github.event.inputs.ref }}-linux-amd64
          overwrite_files: true
